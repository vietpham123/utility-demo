apiVersion: apps/v1
kind: Deployment
metadata:
  name: usage-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usage-service
  template:
    metadata:
      labels:
        app: usage-service
    spec:
      containers:
      - name: usage-service
        image: usage-service:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: usage-service
spec:
  selector:
    app: usage-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
