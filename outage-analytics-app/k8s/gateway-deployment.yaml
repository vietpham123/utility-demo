apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-gateway
  template:
    metadata:
      labels:
        app: analytics-gateway
    spec:
      containers:
      - name: analytics-gateway
        image: analytics-gateway:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-gateway
spec:
  selector:
    app: analytics-gateway
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
