# Reverse Proxy — front-door for all traffic (like Envoy in AstroShop)
# Adds an extra span layer for every trace, proper headers for RUM
upstream gateway {
    server analytics-gateway:80;
}

upstream ui {
    server analytics-ui:80;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Timing headers for RUM resource waterfall
    add_header Server-Timing "proxy;desc=\"Reverse Proxy\";dur=1" always;
    add_header X-Request-Id $request_id always;

    # API requests → gateway
    location /api/ {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # WebSocket upgrade for live events
    location /ws {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # JS/CSS — no-cache so updates are picked up immediately
    location ~* \.(js|css)$ {
        proxy_pass http://ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Static UI assets → ui service
    location / {
        proxy_pass http://ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets for RUM resource timing
        proxy_cache_valid 200 5m;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=300" always;
    }

    # Health check
    location /health {
        return 200 '{"status":"healthy","service":"reverse-proxy"}';
        add_header Content-Type application/json;
    }
}
