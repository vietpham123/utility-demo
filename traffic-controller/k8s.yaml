apiVersion: v1
kind: ServiceAccount
metadata:
  name: traffic-controller
  namespace: utility-outage-analytics
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traffic-controller
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traffic-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traffic-controller
subjects:
- kind: ServiceAccount
  name: traffic-controller
  namespace: utility-outage-analytics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-controller
  namespace: utility-outage-analytics
  labels:
    app: traffic-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-controller
  template:
    metadata:
      labels:
        app: traffic-controller
    spec:
      serviceAccountName: traffic-controller
      containers:
      - name: traffic-controller
        image: vietregistry.azurecr.io/traffic-controller:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      imagePullSecrets:
      - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-controller
  namespace: utility-outage-analytics
spec:
  selector:
    app: traffic-controller
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traffic-controller-ingress
  namespace: utility-outage-analytics
spec:
  ingressClassName: nginx
  rules:
  - host: traffic.vpapps.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: traffic-controller
            port:
              number: 80
