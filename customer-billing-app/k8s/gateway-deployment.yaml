apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-gateway
  template:
    metadata:
      labels:
        app: billing-gateway
    spec:
      containers:
      - name: billing-gateway
        image: billing-gateway:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: billing-gateway
spec:
  selector:
    app: billing-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
