apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-ui
  namespace: utility-customer-billing
  labels:
    app: billing-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-ui
  template:
    metadata:
      labels:
        app: billing-ui
    spec:
      containers:
      - name: billing-ui
        image: vietregistry.azurecr.io/billing-ui:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: billing-ui
  namespace: utility-customer-billing
spec:
  type: LoadBalancer
  selector:
    app: billing-ui
  ports:
  - port: 80
    targetPort: 80
